                date: `2026.05.0${Math.max(1, 7 - Math.floor(i/5))}`,
                views: Math.floor(Math.random() * 3000) + likes * 5,
                likes: likes,
                content: topicBase.content,
                comments: comments
            });
        });

        const ISSUES = ['다람쥐수인 파양률', '수인 혼인신고 기각', '개수인 마운팅 금지법', '사료값 폭등', '수인 전용 미용실 예약', '중성화 부작용 논란', '야생 수인 구조 현황', '수인용 훈련 도구 세일', '길냥이 수인 급식소 갈등', '유명 연예인 수인 학대 의혹'];

        // --- Components ---
        const Icon = ({ name, size = 16, className = "" }) => <i data-lucide={name} className={className} style={{ width: size, height: size, display: 'inline-block' }}></i>;

        const Header = ({ onTitleClick }) => (
            <header className="w-full bg-[#3b5998] border-b border-gray-300">
                <div className="max-w-7xl mx-auto flex justify-between items-center px-4 py-1 text-[10px] sm:text-[11px] text-white/80">
                    <div className="flex gap-4">
                        <span onClick={onTitleClick} className="cursor-pointer hover:underline text-white font-bold">띤사이드</span>
                        <span className="cursor-pointer hover:underline">띤통신</span><span className="cursor-pointer hover:underline">띤뉴스</span>
                    </div>
                    <div className="flex gap-3"><span>로그인</span><span>회원가입</span></div>
                </div>
                <div className="max-w-7xl mx-auto bg-white border-x border-gray-300 flex flex-col md:flex-row items-center px-6 py-6 gap-4">
                    <h1 onClick={onTitleClick} className="text-4xl font-extrabold text-[#2955a0] cursor-pointer tracking-tighter">TTincide</h1>
                    <div className="flex-1 w-full max-w-md relative">
                        <input type="text" placeholder="갤러리 & 통합검색" className="w-full border-2 border-[#2955a0] px-4 py-2 text-sm focus:outline-none" />
                        <div className="absolute right-0 top-0 h-full w-12 bg-[#2955a0] flex items-center justify-center cursor-pointer font-extrabold">
                           <Icon name="search" size={20} className="text-white" />
                        </div>
                    </div>
                </div>
                <nav className="max-w-7xl mx-auto border-x border-gray-300 bg-[#2955a0] text-white text-[12px] font-bold flex items-center px-4 h-10 overflow-x-auto no-scrollbar">
                    <div className="flex gap-6 whitespace-nowrap"><span>메이저갤</span><span className="border-b-2 border-white pb-1">마이너갤</span><span>미니갤</span><span>갤로그</span></div>
                </nav>
            </header>
        );

        const Sidebar = () => (
            <aside className="w-full lg:w-[300px] flex flex-col gap-4">
                <div className="bg-white border border-gray-300 p-4 shadow-sm text-center">
                    <p className="text-xs text-gray-600 mb-3">띤사이드 모든 기능을 이용하시려면 로그인이 필요합니다.</p>
                    <button className="w-full bg-[#2955a0] text-white font-bold py-2 text-sm">로그인</button>
                    <div className="flex justify-center gap-3 text-[11px] text-gray-500 mt-2"><span>회원가입</span><span>ID/PW찾기</span></div>
                </div>
                <div className="bg-white border border-gray-300">
                    <div className="bg-[#2955a0] text-white px-3 py-2 text-xs font-bold flex justify-between items-center">
                        <span>실시간 이슈</span>
                        <div className="flex gap-1"><Icon name="chevron-up" /><Icon name="chevron-down" /></div>
                    </div>
                    <ul className="text-[11px] text-gray-700 bg-white">
                        {ISSUES.map((issue, i) => (
                            <li key={i} className="flex gap-3 px-3 py-1.5 hover:bg-gray-50 cursor-pointer border-b border-gray-50 items-center last:border-0">
                                <span className={`font-bold w-4 text-center ${i < 3 ? 'text-[#2955a0]' : 'text-gray-400'}`}>{i + 1}</span>
                                <span className="flex-1 truncate">{issue}</span>
                                <span className="text-[9px] text-[#ff4e00] font-bold italic">NEW</span>
                            </li>
                        ))}
                    </ul>
                </div>
            </aside>
        );

        const GalleryList = ({ posts, onPostClick, currentPage, totalPages, onPageChange, filter, onFilterChange }) => (
            <div className="bg-white border border-gray-300">
                <div className="p-3 bg-gray-50 flex gap-1 border-b border-gray-200 overflow-x-auto no-scrollbar">
                    {['all', 'concept', 'notice'].map(f => (
                        <button key={f} onClick={() => onFilterChange(f)} className={`px-4 py-1 text-[11px] transition-colors whitespace-nowrap ${filter === f ? 'bg-white font-bold text-[#2955a0] border-gray-300 border' : 'bg-transparent text-gray-500 border border-transparent hover:border-gray-200'}`}>
                            {f === 'all' ? '전체글' : f === 'concept' ? '개념글' : '공지'}
                        </button>
                    ))}
                </div>
                <table className="w-full text-xs text-left border-collapse table-fixed">
                    <thead className="bg-gray-50 border-b border-gray-200">
                        <tr className="text-gray-600">
                            <th className="py-2 w-[40px] sm:w-[60px] text-center">번호</th>
                            <th className="py-2 px-2">제목</th>
                            <th className="py-2 w-[65px] sm:w-[100px]">글쓴이</th>
                            <th className="py-2 w-[45px] sm:w-[70px] text-center">날짜</th>
                            <th className="py-2 w-[40px] sm:w-[50px] text-center">추천</th>
                        </tr>
                    </thead>
                    <tbody className="divide-y divide-gray-100">
                        {posts.map((p, idx) => (
                            <tr key={p.id + idx} onClick={() => onPostClick(p.id)} className={`hover:bg-gray-50 cursor-pointer ${p.isNotice ? 'bg-gray-50/70' : ''}`}>
                                <td className={`py-2 text-center text-[10px] sm:text-xs ${p.isNotice ? 'text-[#ff4e00] font-bold' : 'text-gray-400'}`}>{p.isNotice ? '공지' : 88301 - idx}</td>
                                <td className="py-2 px-2 overflow-hidden">
                                    <div className="flex flex-wrap items-baseline gap-x-1 min-w-0">
                                        <span className="text-gray-400 text-[9px] sm:text-xs shrink-0">[{p.category}]</span>
                                        <span className={`${p.isNotice ? 'font-bold' : ''} text-gray-800 line-clamp-2 sm:line-clamp-1`}>{p.title}</span>
                                        <span className="text-[#ff4e00] font-bold text-[9px] sm:text-xs shrink-0">[{p.comments.length}]</span>
                                    </div>
                                </td>
                                <td className={`py-2 truncate text-[10px] sm:text-xs pr-1 ${p.isNotice ? 'font-bold' : ''}`}>{p.author}</td>
                                <td className="py-2 text-center text-gray-400 text-[10px] sm:text-xs">{p.date.slice(5)}</td>
                                <td className={`py-2 text-center text-[10px] sm:text-xs ${p.likes > 50 ? 'text-[#ff4e00] font-bold' : 'text-gray-400'}`}>{p.likes}</td>
                            </tr>
                        ))}
                    </tbody>
                </table>
                <div className="p-4 flex flex-col sm:flex-row justify-between items-center gap-4 border-t">
                    <div className="flex gap-2.5">
                        {Array.from({ length: totalPages }).slice(0, 10).map((_, i) => (
                            <span key={i} onClick={() => onPageChange(i + 1)} className={`cursor-pointer hover:underline text-sm px-1 ${currentPage === i + 1 ? 'font-bold text-[#2955a0] underline' : 'text-gray-700'}`}>{i + 1}</span>
                        ))}
                    </div>
                    <button className="bg-[#2955a0] text-white font-bold px-6 py-1.5 text-xs shadow-sm">글쓰기</button>
                </div>
            </div>
        );

        const PostDetail = ({ post, onPostClick, onGoToList, prevId, nextId, onAddComment }) => {
            const [name, setName] = useState('');
            const [text, setText] = useState('');
            const handleAdd = () => {
                if (!name.trim() || !text.trim()) return alert('닉네임과 내용을 입력해주세요.');
                onAddComment(post.id, { author: name, content: text });
                setName(''); setText('');
            };
            return (
                <div className="bg-white border border-gray-300">
                    <div className="p-4 bg-gray-50/50 border-b">
                        <div className="flex gap-2 mb-2 items-center">
                            <span className="text-[#2955a0] font-bold text-sm">[{post.category}]</span>
                            <h2 className="text-xl font-bold text-gray-900 leading-snug">{post.title}</h2>
                        </div>
                        <div className="flex justify-between text-[11px] text-gray-500">
                            <div className="flex gap-3"><span className="font-bold text-gray-700">{post.author}</span><span>{post.date}</span></div>
                            <div className="flex gap-3"><span>조회 {post.views}</span><span>추천 {post.likes}</span><span>댓글 {post.comments.length}</span></div>
                        </div>
                    </div>
                    <div className="p-6 min-h-[400px]">
                        <div className="text-[15px] leading-8 text-gray-800 whitespace-pre-wrap post-content">{post.content}</div>
                        <div className="flex justify-center gap-4 mt-20 mb-10">
                            <button className="flex flex-col items-center justify-center w-24 h-24 border-2 border-gray-200 rounded-lg hover:border-[#2955a0] group">
                                <Icon name="thumbs-up" size={24} className="text-gray-300 group-hover:text-[#2955a0]" />
                                <span className="text-lg font-bold text-gray-400 group-hover:text-[#2955a0]">{post.likes}</span>
                            </button>
                        </div>
                    </div>
                    <div className="flex justify-between p-4 bg-gray-50/30 border-t items-center">
                        <div className="flex gap-1.5">
                            <button onClick={onGoToList} className="px-3 py-1.5 border bg-white text-xs font-bold">전체글</button>
                            <button onClick={() => prevId && onPostClick(prevId)} disabled={!prevId} className="px-3 py-1.5 border bg-white text-xs font-bold disabled:opacity-50">이전글</button>
                            <button onClick={() => nextId && onPostClick(nextId)} disabled={!nextId} className="px-3 py-1.5 border bg-white text-xs font-bold disabled:opacity-50">다음글</button>
                        </div>
                        <button className="px-5 py-1.5 bg-[#2955a0] text-white font-bold text-xs shadow-sm">글쓰기</button>
                    </div>
                    <div className="p-4">
                        <h3 className="font-bold text-sm mb-4">전체 댓글 <span className="text-[#ff4e00]">{post.comments.length}</span>개</h3>
                        <div className="border-t divide-y">
                            {post.comments.map(c => (
                                <div key={c.id} className="py-3">
                                    <div className="flex justify-between mb-1"><span className="font-bold text-[#2955a0] text-[13px]">{c.author}</span><span className="text-[11px] text-gray-400">{c.date}</span></div>
                                    <p className="text-[13px] text-gray-800 leading-relaxed">{c.content}</p>
                                    {c.replies?.map(r => (
                                        <div key={r.id} className="ml-8 mt-3 bg-gray-50 p-2 border-l-2 border-gray-200">
                                            <div className="flex justify-between mb-1"><span className="font-bold text-[#2955a0] text-[12px]">{r.author}</span><span className="text-[10px] text-gray-400">{r.date}</span></div>
                                            <p className="text-[12px] text-gray-800">{r.content}</p>
                                        </div>
                                    ))}
                                </div>
                            ))}
                        </div>
                        <div className="mt-6 p-4 bg-gray-50 border">
                            <input value={name} onChange={e => setName(e.target.value)} placeholder="닉네임" className="w-32 mb-2 border px-2 py-1 text-xs outline-none focus:border-[#2955a0]" />
                            <div className="flex gap-2">
                                <textarea value={text} onChange={e => setText(e.target.value)} placeholder="댓글 내용을 입력하세요" className="flex-1 border p-2 text-xs h-20 focus:outline-[#2955a0] resize-none"></textarea>
                                <button onClick={handleAdd} className="w-20 bg-[#2955a0] text-white font-bold h-20">등록</button>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        function App() {
            const [posts, setPosts] = useState(INITIAL_POSTS);
            const [view, setView] = useState('post');
            const [selectedId, setSelectedId] = useState('squirrel-tip');
            const [filter, setFilter] = useState('all');
            const [page, setPage] = useState(1);
            const PER_PAGE = 15;

            const filtered = useMemo(() => {
                let list = [...posts];
                if (filter === 'concept') list = list.filter(p => !p.isNotice && p.likes >= 50);
                else if (filter === 'notice') list = list.filter(p => p.isNotice);
                if (filter !== 'concept') {
                    const notices = list.filter(p => p.isNotice);
                    const regulars = list.filter(p => !p.isNotice);
                    return [...notices, ...regulars];
                }
                return list;
            }, [posts, filter]);

            const totalPages = Math.ceil(filtered.length / PER_PAGE);
            const currentPosts = filtered.slice((page-1)*PER_PAGE, page*PER_PAGE);
            const selectedPost = posts.find(p => p.id === selectedId) || posts[0];
            const navigation = useMemo(() => {
                const idx = filtered.findIndex(p => p.id === selectedId);
                return { prevId: idx > 0 ? filtered[idx-1].id : null, nextId: idx < filtered.length-1 ? filtered[idx+1].id : null };
            }, [filtered, selectedId]);

            const handleComment = (postId, comment) => {
                const now = new Date();
                const dStr = `${now.getFullYear()}.${String(now.getMonth()+1).padStart(2,'0')}.${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;
                setPosts(prev => prev.map(p => p.id === postId ? { ...p, comments: [...p.comments, { ...comment, id: Date.now(), date: dStr }] } : p));
            };

            useEffect(() => { 
                if (window.lucide) {
                    window.lucide.createIcons();
                }
            }, [view, selectedId, page]);

            return (
                <div className="min-h-screen">
                    <Header onTitleClick={() => { setView('post'); setSelectedId('squirrel-tip'); window.scrollTo(0, 0); }} />
                    <main className="max-w-7xl mx-auto px-2 sm:px-4 py-4 sm:py-8 flex flex-col lg:flex-row gap-6">
                        <div className="flex-1 min-w-0 flex flex-col gap-6">
                            {/* Gallery Info Box */}
                            <div className="bg-white border border-gray-300 p-4 shadow-sm flex flex-col gap-3">
                                <div className="flex justify-between items-start">
                                    <div className="flex items-center gap-3">
                                        <div onClick={() => setView('post')} className="w-12 h-12 bg-[#2955a0] rounded-sm flex items-center justify-center text-white font-bold text-xl cursor-pointer">애</div>
                                        <div>
                                            <h2 onClick={() => setView('list')} className="text-xl font-bold hover:underline cursor-pointer">애완수인갤러리 <span className="dc-blue">ⓜ</span></h2>
                                            <div className="flex gap-2 items-center mt-1">
                                                <span className="text-[10px] text-gray-500">이용안내</span>
                                                <span className="text-gray-300">|</span>
                                                <span className="text-[10px] text-gray-500">갤주소 복사</span>
                                            </div>
                                        </div>
                                    </div>
                                    <div className="text-right flex flex-col items-end">
                                        <div className="bg-[#2955a0] text-white px-2 py-0.5 mb-1 text-[10px] font-bold">마이갤</div>
                                        <div className="text-[10px] text-gray-400">매니저: <b>수인맘</b></div>
                                    </div>
                                </div>
                                <p className="text-[11px] text-gray-500 border-t pt-2 leading-relaxed">애완 수인 육성 노하우 및 분양 정보 공유하는 갤러리입니다.<br/><span className="opacity-70 text-[10px]">※ 파양 및 유기 관련 글 작성 시 엄중 처벌됩니다.</span></p>
                            </div>

                            {view === 'post' ? (
                                <React.Fragment>
                                    <PostDetail post={selectedPost} onGoToList={() => setView('list')} onPostClick={id => {setSelectedId(id); window.scrollTo({top:0, behavior:'smooth'});}} prevId={navigation.prevId} nextId={navigation.nextId} onAddComment={handleComment} />
                                    <div className="mt-4">
                                        <h3 className="text-sm font-bold mb-2 text-gray-700">애완수인 갤러리 목록</h3>
                                        <GalleryList posts={currentPosts} onPostClick={id => {setSelectedId(id); window.scrollTo({top:0, behavior:'smooth'});}} currentPage={page} totalPages={totalPages} onPageChange={setPage} filter={filter} onFilterChange={setFilter} />
                                    </div>
                                </React.Fragment>
                            ) : (
                                <GalleryList posts={currentPosts} onPostClick={id => {setSelectedId(id); setView('post'); window.scrollTo({top:0, behavior:'smooth'});}} currentPage={page} totalPages={totalPages} onPageChange={setPage} filter={filter} onFilterChange={setFilter} />
                            )}
                        </div>
                        <Sidebar />
                    </main>
                    <footer className="max-w-7xl mx-auto px-4 py-10 mt-10 border-t border-gray-300 text-[11px] text-gray-500 flex flex-col gap-2">
                         <div className="flex gap-4">
                            <span>이용약관</span><span>개인정보처리방침</span><span>청소년보호정책</span><span>수인권고안</span>
                        </div>
                        <p>Copyright © 2026 TTincide. All rights reserved.</p>
                        <p className="mt-2">본 사이트는 특정 세계관을 바탕으로 한 가상 커뮤니티입니다. 실제 사건 및 인물과는 무관합니다.</p>
                    </footer>
                </div>
            );
        }
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
